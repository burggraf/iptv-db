server {
    listen 80;
    server_name iptv.yourdomain.com;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect to HTTPS (after certbot setup)
    # return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name iptv.yourdomain.com;

    # SSL certificates (set by certbot)
    ssl_certificate /etc/letsencrypt/live/iptv.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iptv.yourdomain.com/privkey.pem;

    # SPA frontend (served by PocketBase from pb_public/)
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for PocketBase real-time)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Worker API
    location /worker/ {
        rewrite ^/worker/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long scrape/sync operations
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Block PocketBase admin UI from public access (optional)
    # location /_/ {
    #     deny all;
    #     return 403;
    # }
}
